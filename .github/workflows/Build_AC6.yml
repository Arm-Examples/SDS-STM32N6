name: Build example with AC6
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  CI:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        config:
          [ # example directory, toolchain
            { dir: ./KeywordSpotting, toolchain: AC6, }
          ]

    steps:
      - name: Checkout this repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install required tools
        uses: ARM-software/cmsis-actions/vcpkg@8a50b77681a484568e08f31fb7c2285c4735f682 # v1.3
        with:
          config: "./vcpkg-configuration.json"

      - name: Activate Arm tool license
        uses: ARM-software/cmsis-actions/armlm@8a50b77681a484568e08f31fb7c2285c4735f682 # v1.3

      - name: Initialize CMSIS pack root folder
        run: |
          cpackget init https://www.keil.com/pack/index.pidx
          cpackget update-index

      - name: Disable STM32 signing commands in CI checkout
        working-directory: ${{matrix.config.dir}}
        run: |
          for project in algorithm/AlgorithmTest.cproject.yml datatest/DataTest.cproject.yml; do
            sed -i '/^  # Post-build commands to add header/,+9d' "$project"
          done

      - name: Build example in ${{matrix.config.dir}} with ${{matrix.config.toolchain}} toolchain
        working-directory: ${{matrix.config.dir}}
        run: |
          cbuild SDS.csolution.yml --toolchain ${{matrix.config.toolchain}} --packs
